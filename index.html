<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halo - Clima & Notícias</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <h1 class="logo">Halo - Clima e CEP</h1>
      <nav>
        <ul>
          <li><a href="#clima">Clima</a></li>
          <li><a href="#cep">Busca CEP</a></li>
          <li><a href="#contato">Contato</a></li>
        </ul>
      </nav>
      <button id="btnMenu">☰</button>
    </div>
  </header>

  <section class="hero">
    <h2>Informações em tempo real</h2>
    <p>Consulte clima, endereço por CEP e muito mais.</p>
  </section>

  <section id="clima" class="secao">
    <h2>Previsão do Tempo</h2>
    <div class="busca">
      <input type="text" id="inputCidade" placeholder="Digite o nome da cidade">
      <button class="btn" id="btnClima">Buscar</button>
    </div>
    <div id="resultadoClima" class="resultado"></div>
  </section>

  <section id="cep" class="secao cinza">
    <h2>Busca por CEP</h2>
    <div class="busca">
      <input type="text" id="inputCep" placeholder="Digite o CEP (somente números)">
      <button class="btn" id="btnCep">Buscar</button>
    </div>
    <div id="resultadoCep" class="resultado"></div>
  </section>

  <section id="contato" class="secao">
    <h2>Entre em Contato</h2>
    <form id="formContato">

      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Seu nome completo" required minlength="3">
      <span class="erro" id="erroNome"></span>

      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required>
      <span class="erro" id="erroEmail"></span>

      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
      <span class="erro" id="erroTelefone"></span>

      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" placeholder="Como podemos ajudar?" required minlength="10"></textarea>
      <span class="erro" id="erroMensagem"></span>

      <button type="submit" class="btn">Enviar mensagem</button>
      <p id="sucesso" style="display: none;">Mensagem enviada com sucesso!</p>

    </form>
  </section>
  <script src="js/script.js"></script>
</body>
</html>
